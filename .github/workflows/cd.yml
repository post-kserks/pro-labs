name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            suffix: ""
          - os: macos-latest
            platform: macos
            arch: arm64
            suffix: ""
          - os: windows-latest
            platform: windows
            arch: amd64
            suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Build Web UI
        shell: bash
        run: |
          WEB_DIR="server/internal/httpserver/web"
          DIST_DIR="${WEB_DIR}/dist"
          if [ -f "$WEB_DIR/package.json" ]; then
            cd "$WEB_DIR"
            npm install --silent
            npm run build
          else
            mkdir -p "$DIST_DIR"
            echo "Web UI not built" > "${DIST_DIR}/index.html"
          fi

      - name: Build Server & Tools
        shell: bash
        run: |
          mkdir -p build_output
          cd server
          go build -v -o ../build_output/vaultdb-server${{ matrix.suffix }} ./cmd/vaultdb-server
          go build -v -o ../build_output/benchmark${{ matrix.suffix }} ../tools/benchmark/main.go
          cd ..

      - name: Build Client (CMake)
        shell: bash
        run: |
          cmake -S client -B client/build -DCMAKE_BUILD_TYPE=Release
          cmake --build client/build --config Release
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp client/build/Release/vaultdb-shell.exe build_output/
            cp client/build/tui/Release/vaultdb-tui.exe build_output/
            cp client/build/Release/vaultdb.dll build_output/ 2>/dev/null || true
          else
            cp client/build/vaultdb-shell build_output/
            cp client/build/tui/vaultdb-tui build_output/
            cp client/build/libvaultdb* build_output/ 2>/dev/null || true
          fi

      - name: Create Archive
        shell: bash
        run: |
          ASSET_NAME="vaultdb-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p release_assets
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a "release_assets/${ASSET_NAME}.zip" ./build_output/*
          else
            tar -czvf "release_assets/${ASSET_NAME}.tar.gz" -C build_output .
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaultdb-${{ matrix.platform }}-${{ matrix.arch }}
          path: release_assets/*

  publish-image:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image owner
        id: vars
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/vaultdb
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  release:
    name: GitHub release (tags)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs:
      - build
      - publish-image
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_assets
          pattern: vaultdb-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: all_assets/*
          generate_release_notes: true
