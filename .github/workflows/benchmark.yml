name: Benchmark
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Regression benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on PR branch
        run: |
          go test -run=^$ -bench=. -benchmem -count=5 -timeout=30m \
            ./benchmarks/ > ${{ github.workspace }}/bench-new.txt 2>&1

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          clean: false

      - name: Run benchmarks on main
        run: |
          go test -run=^$ -bench=. -benchmem -count=5 -timeout=30m \
            ./benchmarks/ > ${{ github.workspace }}/bench-old.txt 2>&1

      - name: Switch back to PR branch for gate script
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Compare with benchstat
        id: benchstat
        run: |
          GATE_OUTPUT=$(../tools/benchstat-gate.sh \
            ${{ github.workspace }}/bench-old.txt \
            ${{ github.workspace }}/bench-new.txt 2>&1) || true
          echo "$GATE_OUTPUT"
          # Save for later steps
          echo "$GATE_OUTPUT" > ${{ github.workspace }}/benchstat-output.txt
          # Determine exit code from the gate script
          if ../tools/benchstat-gate.sh \
            ${{ github.workspace }}/bench-old.txt \
            ${{ github.workspace }}/bench-new.txt; then
            echo "regression=false" >> $GITHUB_OUTPUT
          else
            echo "regression=true" >> $GITHUB_OUTPUT
          fi

      - name: Post benchstat comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('${{ github.workspace }}/benchstat-output.txt', 'utf8');
            const hasRegression = '${{ steps.benchstat.outputs.regression }}' === 'true';
            const emoji = hasRegression ? '⚠️' : '✅';
            const title = hasRegression
              ? `${emoji} Benchmark Regression Detected`
              : `${emoji} Benchmarks OK`;
            const body = `## ${title}\n\n<details>\n<summary>Benchstat comparison (PR vs main)</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>\n\n${hasRegression ? '> **Action required**: One or more benchmarks regressed by more than 10%. Please investigate before merging.' : 'No regressions exceeding 10% threshold detected.'}`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchstat comparison')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Label regression
        if: steps.benchstat.outputs.regression == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'benchmark-regression';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'd93f0b',
                description: 'Benchmark regression detected (>10%)',
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

      - name: Remove regression label if fixed
        if: steps.benchstat.outputs.regression == 'false'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'benchmark-regression',
            });

      - name: Fail if regression
        if: steps.benchstat.outputs.regression == 'true'
        run: |
          echo "::error::Benchmark regression detected (>10%). See PR comment for details."
          exit 1
