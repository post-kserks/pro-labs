<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocVault — Управление документами</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>DocVault</h1>
            <p class="subtitle">Корпоративная система управления документами</p>
        </header>

        <nav class="nav">
            <button class="nav-btn active" data-view="documents">Документы</button>
            <button class="nav-btn" data-view="stats">Статистика</button>
            <button class="nav-btn" data-view="audit">Аудит</button>
        </nav>

        <main class="main">
            <!-- Documents View -->
            <div id="view-documents" class="view active">
                <div class="toolbar">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Поиск по номеру или названию...">
                        <select id="filter-department">
                            <option value="">Все отделы</option>
                            <option value="legal">Юридический</option>
                            <option value="finance">Финансы</option>
                            <option value="hr">HR</option>
                            <option value="it">IT</option>
                        </select>
                        <button id="btn-search" class="btn btn-primary">Найти</button>
                    </div>
                    <button id="btn-create" class="btn btn-success">+ Новый документ</button>
                </div>

                <div id="documents-list" class="documents-list"></div>
            </div>

            <!-- Stats View -->
            <div id="view-stats" class="view">
                <div id="stats-content" class="stats-content"></div>
            </div>

            <!-- Audit View -->
            <div id="view-audit" class="view">
                <div id="audit-content" class="audit-content"></div>
            </div>
        </main>

        <!-- Document Detail Modal -->
        <div id="modal-detail" class="modal" style="display:none">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h2 id="detail-title">Документ</h2>
                    <button class="modal-close" onclick="closeModal('modal-detail')">&times;</button>
                </div>
                <div id="detail-body" class="modal-body"></div>
            </div>
        </div>

        <!-- Create/Edit Modal -->
        <div id="modal-form" class="modal" style="display:none">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="form-title">Новый документ</h2>
                    <button class="modal-close" onclick="closeModal('modal-form')">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="document-form">
                        <input type="hidden" id="form-id">
                        <div class="form-group">
                            <label>Номер документа</label>
                            <input type="text" id="form-doc-number" required>
                        </div>
                        <div class="form-group">
                            <label>Название</label>
                            <input type="text" id="form-title-input" required>
                        </div>
                        <div class="form-group">
                            <label>Содержание</label>
                            <textarea id="form-content" rows="4"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Отдел</label>
                                <select id="form-department">
                                    <option value="legal">Юридический</option>
                                    <option value="finance">Финансы</option>
                                    <option value="hr">HR</option>
                                    <option value="it">IT</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Автор</label>
                                <input type="text" id="form-author">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn" onclick="closeModal('modal-form')">Отмена</button>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
