<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaultDB Web</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0b1220; color: #d6deff; }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 12px; padding: 12px; min-height: 100vh; box-sizing: border-box; }
    .panel { border: 1px solid #243045; border-radius: 8px; background: #10192b; padding: 10px; box-sizing: border-box; }
    .title { font-size: 13px; color: #93b4ff; margin-bottom: 8px; }
    textarea, input { width: 100%; box-sizing: border-box; border: 1px solid #344766; background: #0c1526; color: #d6deff; border-radius: 6px; padding: 8px; font: inherit; }
    textarea { min-height: 180px; resize: vertical; }
    button { border: 1px solid #3d5a91; background: #14326b; color: #fff; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
    .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #243045; padding: 6px; text-align: left; vertical-align: top; }
    th { background: #13223f; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
    .status { font-size: 12px; color: #9ab4e8; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <div class="title">Connection</div>
      <label>Database</label>
      <input id="database" value="analytics" />
      <div class="row">
        <label style="flex:1">Token</label>
      </div>
      <input id="token" value="vdb_sk_local_dev" />
      <div class="status">API base: same host, <code>/api/*</code></div>
    </section>

    <main class="panel">
      <div class="title">Query Editor</div>
      <textarea id="query">SELECT * FROM users;</textarea>
      <div class="row">
        <button id="run">Run</button>
        <div id="meta" class="status"></div>
      </div>
      <div id="result" class="panel" style="margin-top:10px; min-height:260px;"></div>
    </main>
  </div>

  <script>
    const queryEl = document.getElementById("query");
    const resultEl = document.getElementById("result");
    const metaEl = document.getElementById("meta");

    function renderTable(columns, rows) {
      const table = document.createElement("table");
      const head = document.createElement("tr");
      columns.forEach(c => {
        const th = document.createElement("th");
        th.textContent = c;
        head.appendChild(th);
      });
      table.appendChild(head);

      rows.forEach(r => {
        const tr = document.createElement("tr");
        r.forEach(v => {
          const td = document.createElement("td");
          td.textContent = v === null ? "NULL" : String(v);
          tr.appendChild(td);
        });
        table.appendChild(tr);
      });
      return table;
    }

    async function runQuery() {
      const database = document.getElementById("database").value.trim();
      const token = document.getElementById("token").value.trim();
      const query = queryEl.value.trim();
      if (!query) return;

      resultEl.textContent = "Running...";
      metaEl.textContent = "";

      try {
        const resp = await fetch("/api/query", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ database, query })
        });
        const data = await resp.json();
        resultEl.innerHTML = "";
        if (!resp.ok || data.status === "error") {
          const pre = document.createElement("pre");
          pre.textContent = data.message || "Request failed";
          resultEl.appendChild(pre);
          return;
        }

        metaEl.textContent = `${data.type} • ${Number(data.duration_ms || 0).toFixed(2)}ms${data.as_of_note ? " • " + data.as_of_note : ""}`;
        if (data.type === "rows") {
          resultEl.appendChild(renderTable(data.columns || [], data.rows || []));
        } else if (data.type === "affected") {
          const pre = document.createElement("pre");
          pre.textContent = `Affected rows: ${data.affected || 0}`;
          resultEl.appendChild(pre);
        } else {
          const pre = document.createElement("pre");
          pre.textContent = data.message || "OK";
          resultEl.appendChild(pre);
        }
      } catch (error) {
        resultEl.innerHTML = "";
        const pre = document.createElement("pre");
        pre.textContent = error.message || String(error);
        resultEl.appendChild(pre);
      }
    }

    document.getElementById("run").addEventListener("click", runQuery);
    queryEl.addEventListener("keydown", (event) => {
      if (event.key === "F5" || (event.key === "Enter" && event.ctrlKey)) {
        event.preventDefault();
        runQuery();
      }
    });
  </script>
</body>
</html>
